name: CodeQL

on:
  schedule:
    - cron: "0 2 * * 1" # Mondays 11:00 JST
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ruby
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v3
